backend:
  name: github
  repo: gwengreenwood/gwen-webpage
  branch: main

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "categories"
    label: "Poem Categories"
    folder: "src/content/categories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Category name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false, choose_url: false }
      - { label: "Sort order", name: "order", widget: "number", required: false, value_type: "int", min: 1 }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
  - name: "poems"
    label: "Poems"
    folder: "src/content/poems"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Short summary", name: "summary", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "categories"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
      - { label: "Background image", name: "image", widget: "image", choose_url: false }
      - { label: "Music", name: "music", widget: "file", required: false, choose_url: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Show on homepage", name: "featured", widget: "boolean", default: true }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Poem", name: "body", widget: "markdown" }
