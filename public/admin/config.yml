# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: gwengreenwood/gwen-webpage
  branch: main

media_folder: "public/media"
public_folder: "/media"

collections:
  - name: "categories"
    label: "Poem Categories"
    folder: "src/content/categories"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{order}}. {{title}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Display order", name: "order", widget: "number", required: false, value_type: "int", min: 1, hint: "Lower numbers show first on the published Poetry page. Use 1, 2, 3, and so on." }
      - { label: "Category name", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false, choose_url: false }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
  - name: "site_settings"
    label: "Site Settings"
    files:
      - name: "home"
        label: "Home Page"
        file: "src/content/settings/home.md"
        format: "frontmatter"
        fields:
          - { label: "Main page image", name: "homeImage", widget: "image", choose_url: false, hint: "This controls the large background image on the main page." }
  - name: "poems"
    label: "Poems"
    folder: "src/content/poems"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Short summary", name: "summary", widget: "text" }
      - label: "Category"
        name: "category"
        widget: "relation"
        collection: "categories"
        search_fields: ["title"]
        value_field: "{{slug}}"
        display_fields: ["title"]
      - { label: "Background image", name: "image", widget: "image", choose_url: false }
      - { label: "Music", name: "music", widget: "file", required: false, choose_url: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Show on homepage", name: "featured", widget: "boolean", default: true }
      - { label: "Draft", name: "draft", widget: "boolean", default: false }
      - { label: "Poem", name: "body", widget: "markdown" }
